# Supabase project config (optional overrides).
# JWT verification must be OFF for paymongo-checkout so the browser's
# CORS preflight (OPTIONS) request can succeed without an Authorization header.
#
# Deploy with:
#   supabase functions deploy paymongo-checkout --no-verify-jwt
# Then set the secret in Supabase (Dashboard or CLI):
#   supabase secrets set PAYMONGO_SECRET_KEY=sk_test_your_key

[functions.paymongo-checkout]
verify_jwt = false

[functions.send-approval-email]
verify_jwt = false

# PayMongo calls this URL directly with no Supabase JWT, so JWT verification must
# be OFF or every webhook is rejected with 401. Security is enforced inside the
# function instead, via HMAC-SHA256 signature verification (PAYMONGO_WEBHOOK_SECRET).
[functions.paymongo-webhook]
verify_jwt = false

# Payout worker: invoked by a schedule/admin, not the browser. JWT off because a
# cron caller carries no Supabase JWT; access is gated by PAYOUT_WORKER_SECRET
# (x-worker-secret header) inside the function.
[functions.process-payouts]
verify_jwt = false
