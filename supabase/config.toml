# Supabase project config (optional overrides).
#
# Auth email rate limit. The built-in Supabase SMTP is hard-capped at ~2 emails/
# hour — raising email_sent above that REQUIRES a custom SMTP provider configured
# in the Dashboard (Authentication > Emails > SMTP Settings) or [auth.email.smtp]
# below. After editing, push to the hosted project with:
#   supabase config push
[auth.rate_limit]
# Max emails (signup confirmations, magic links, recovery, etc.) sent per hour.
email_sent = 30

# Email auth provider.
#
# enable_confirmations = false turns OFF the "Confirm email" requirement. Users
# (including existing accounts that never confirmed) can sign in immediately
# without clicking a verification link. This was enabled because the built-in
# SMTP cap meant confirmation emails often never arrived, leaving real accounts
# locked out with a 400 "Email not confirmed" at /auth/v1/token. Trade-off:
# signups are no longer email-verified. Re-enable (set true) once a custom SMTP
# provider is configured so confirmation emails reliably deliver.
[auth.email]
enable_confirmations = false

# JWT verification must be OFF for paymongo-checkout so the browser's
# CORS preflight (OPTIONS) request can succeed without an Authorization header.
#
# Deploy with:
#   supabase functions deploy paymongo-checkout --no-verify-jwt
# Then set the secret in Supabase (Dashboard or CLI):
#   supabase secrets set PAYMONGO_SECRET_KEY=sk_test_your_key

[functions.paymongo-checkout]
verify_jwt = false

# A2 hardening — this function sends mail via Resend. With verify_jwt = false it
# was an OPEN RELAY: anyone on the internet could POST arbitrary to/subject/html
# and send spoofed "Carbonify" email from the domain. Require a valid Supabase
# JWT so only signed-in users (role applicants) can trigger it. The app already
# invokes it via supabase.functions.invoke, which forwards the user's token.
# Redeploy with:  supabase functions deploy send-approval-email
[functions.send-approval-email]
verify_jwt = true

# PayMongo calls this URL directly with no Supabase JWT, so JWT verification must
# be OFF or every webhook is rejected with 401. Security is enforced inside the
# function instead, via HMAC-SHA256 signature verification (PAYMONGO_WEBHOOK_SECRET).
[functions.paymongo-webhook]
verify_jwt = false

# Payout worker: invoked by a schedule/admin, not the browser. JWT off because a
# cron caller carries no Supabase JWT; access is gated by PAYOUT_WORKER_SECRET
# (x-worker-secret header) inside the function.
[functions.process-payouts]
verify_jwt = false
